<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Portas das Avaliações PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  text-align: center;
  background: #f5f5f5;
}

/* Caixa */
.fachada {
  background: #28a745;
  color: white;
  padding: 20px;
  margin: 20px auto;
  width: 85%;
  border-radius: 10px;
}

/* Estrelas */
.stars span {
  font-size: 40px;
  cursor: pointer;
  color: gray;
}

.stars span.active {
  color: gold;
}

/* Juiz */
.juiz-box {
  font-size: 60px;
}


/* Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<h1 class="mt-3"> Portas das Avaliações</h1>



<!-- TEXTO -->
<div class="fachada">
  <h2>Bem-vindo ao jogo!</h2>
  <p>Avalie como se fosse uma partida </p>
</div>

<!-- AVALIAÇÃO -->
<div class="container">
  <div class="juiz-box" id="juizIcon">🧑‍⚖️</div>
  <h4 id="juizMsg">Aguardando avaliação...</h4>

  <div class="stars my-3" id="stars">
    <span onclick="avaliar(1)">★</span>
    <span onclick="avaliar(2)">★</span>
    <span onclick="avaliar(3)">★</span>
    <span onclick="avaliar(4)">★</span>
    <span onclick="avaliar(5)">★</span>
  </div>

  <button class="btn btn-success" onclick="finalizar()">Finalizar</button>

  <h5 class="mt-4">⭐ Média: <span id="media">0</span></h5>
</div>

<!-- SOM -->
<audio id="golSom" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<canvas id="efeitos"></canvas>

<script>
/* SLIDER AUTOMÁTICO */
let slideIndex = 0;
const slides = document.querySelectorAll(".banner img");

function trocarSlide() {
  slides.forEach(s => s.classList.remove("active"));
  slides[slideIndex].classList.add("active");

  slideIndex = (slideIndex + 1) % slides.length;
}

setInterval(trocarSlide, 3000);

/* AVALIAÇÃO */
let notaAtual = 0;

function avaliar(nota) {
  notaAtual = nota;

  document.querySelectorAll("#stars span").forEach((s, i) => {
    s.classList.toggle("active", i < nota);
  });

  const msg = document.getElementById("juizMsg");
  const icon = document.getElementById("juizIcon");

  if (nota <= 2) {
    msg.innerText = "Falta grave!";
    icon.innerText = "🟥";
  } else if (nota === 3) {
    msg.innerText = "Jogo equilibrado!";
    icon.innerText = "🟨";
  } else {
    msg.innerText = "GOOOL!";
    icon.innerText = "🟩";
  }
}

/* SALVAR NOTA */
function salvarNota(nota) {
  let notas = JSON.parse(localStorage.getItem("notas")) || [];
  notas.push(nota);
  localStorage.setItem("notas", JSON.stringify(notas));
  atualizarMedia();
}

function atualizarMedia() {
  let notas = JSON.parse(localStorage.getItem("notas")) || [];
  if (notas.length === 0) return;

  let media = notas.reduce((a,b) => a+b, 0) / notas.length;
  document.getElementById("media").innerText = media.toFixed(1);
}

/* CONFETE */
const canvas = document.getElementById("efeitos");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetes = [];
let animando = false;

function criarConfete() {
  const cores = ["#ffdf00", "#28a745", "#002776"];
  return {
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*6+4,
    speedX: Math.random()*2-1,
    speedY: Math.random()*3+2,
    color: cores[Math.floor(Math.random()*3)]
  };
}

function animarConfete() {
  if (!animando) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  confetes.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI*2);
    ctx.fillStyle = c.color;
    ctx.fill();

    c.x += c.speedX;
    c.y += c.speedY;

    if (c.y > canvas.height) c.y = -10;
  });

  requestAnimationFrame(animarConfete);
}

function iniciarConfete(duracao=3000) {
  confetes = [];
  for(let i=0;i<200;i++) confetes.push(criarConfete());

  animando = true;
  animarConfete();

  setTimeout(()=>{
    animando=false;
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }, duracao);
}

/* FINALIZAR */
function finalizar() {
  if(notaAtual===0){
    alert("Dê uma nota!");
    return;
  }

  salvarNota(notaAtual);
  document.getElementById("golSom").play();
  document.getElementById("juizMsg").innerText = "Fim de jogo! 🎉";

  iniciarConfete();
}

/* INICIAR */
window.onload = () => {
  atualizarMedia();
  iniciarConfete();
};
</script>

</body>
</html>
